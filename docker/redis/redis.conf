# Минимальная конфигурация Redis для DSU проекта
bind 0.0.0.0
port 6379

# Аутентификация
requirepass redispass123

# Сохранение данных
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Политика памяти
maxmemory 512mb
maxmemory-policy allkeys-lru

# Логирование
loglevel notice
logfile ""

# Клиенты
maxclients 10000
timeout 0

# Сохранение на диск
save 900 1
save 300 10
save 60 10000

# RDB настройки
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data
